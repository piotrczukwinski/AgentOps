name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: lint-and-test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (with dev and yaml extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,yaml]'

      - name: py_compile every Python file under agentops/
        run: |
          python -m py_compile $(find agentops -name '*.py' | sort)

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -q

      - name: Ruff lint
        run: |
          ruff check .

      - name: CLI smoke (agentops --help)
        run: |
          agentops --help

      - name: CLI smoke (agentops doctor)
        run: |
          agentops doctor
