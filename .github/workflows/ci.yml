name: AgentOps CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e '.[yaml]'
          python -m pip install ruff

      - name: Compile
        run: python -m py_compile $(find agentops -name '*.py' | sort)

      - name: Unit tests
        run: python -m unittest discover -s tests -q

      - name: CLI version
        run: python -m agentops --version

      - name: Doctor
        run: python -m agentops doctor

      - name: CLI help
        run: python -m agentops --help

      - name: Ruff
        run: python -m ruff check agentops tests
